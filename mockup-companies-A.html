<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Companies & Contacts — Mockup A: Refined Master-Detail</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; color: #0f172a; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  /* Shell */
  .shell { display: flex; height: 100vh; overflow: hidden; }
  .sidebar-nav { width: 200px; background: #0f172a; flex-shrink: 0; display: flex; flex-direction: column; }
  .sidebar-logo { padding: 18px 16px; border-bottom: 1px solid #1e293b; }
  .sidebar-logo h1 { font-size: 13px; font-weight: 700; color: #fff; }
  .sidebar-logo p { font-size: 10px; color: #64748b; margin-top: 2px; }
  .nav-item { display: flex; align-items: center; gap: 9px; padding: 9px 16px; font-size: 12px; font-weight: 500; color: #94a3b8; cursor: pointer; border: none; background: none; width: 100%; text-align: left; }
  .nav-item:hover { color: #fff; background: #1e293b; }
  .nav-item.active { color: #fff; background: #1e293b; border-left: 3px solid #059669; padding-left: 13px; }
  .nav-item svg { width: 14px; height: 14px; flex-shrink: 0; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  /* Top bar */
  .topbar { padding: 0 24px; background: #fff; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; gap: 0; flex-shrink: 0; }
  .tab-btn { padding: 14px 18px; font-size: 13px; font-weight: 600; background: none; border: none; cursor: pointer; color: #64748b; border-bottom: 2px solid transparent; }
  .tab-btn.active { color: #059669; border-bottom-color: #059669; }
  /* Content */
  .content { flex: 1; padding: 16px; overflow: hidden; display: flex; flex-direction: column; }
  /* Panel */
  .panel { display: flex; flex: 1; background: #fff; border-radius: 10px; border: 1px solid #e2e8f0; overflow: hidden; min-height: 0; }
  /* Left list */
  .left-list { width: 280px; flex-shrink: 0; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; }
  .left-list-head { padding: 12px; border-bottom: 1px solid #e2e8f0; display: flex; flex-direction: column; gap: 7px; }
  .search-wrap { position: relative; }
  .search-wrap svg { position: absolute; top: 8px; left: 8px; color: #94a3b8; width: 13px; height: 13px; }
  .search-wrap input { width: 100%; padding: 7px 7px 7px 26px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 12px; background: #f8fafc; color: #0f172a; outline: none; }
  .filter-row { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
  select.filter-sel { flex: 1; min-width: 0; padding: 5px 6px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 11px; background: #fff; color: #0f172a; outline: none; }
  .toggle-group { display: flex; gap: 3px; }
  .toggle-group label { font-size: 10px; font-weight: 600; color: #64748b; align-self: center; margin-right: 2px; }
  .tgl { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; cursor: pointer; border: 1px solid #e2e8f0; background: #f1f5f9; color: #64748b; }
  .tgl.on { background: #0f172a; color: #fff; border-color: #0f172a; }
  .filter-meta { display: flex; justify-content: space-between; align-items: center; }
  .filter-count { font-size: 10px; color: #94a3b8; }
  .clear-btn { font-size: 10px; color: #059669; background: none; border: none; cursor: pointer; font-weight: 600; padding: 0; }
  /* List items */
  .list-items { flex: 1; overflow-y: auto; }
  .list-item { padding: 10px 12px; cursor: pointer; border-bottom: 1px solid #f1f5f9; border-left: 3px solid transparent; }
  .list-item:hover { background: #f8fafc; }
  .list-item.active { background: #f0fdf4; border-left-color: #059669; }
  .li-name-row { display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
  .li-name { font-size: 13px; font-weight: 600; color: #0f172a; }
  .tier-badge { font-size: 9px; padding: 1px 5px; border-radius: 4px; font-weight: 700; flex-shrink: 0; }
  .tier-gold   { background: #fef3c7; color: #92400e; }
  .tier-silver { background: #f1f5f9; color: #475569; }
  .tier-bronze { background: #fff7ed; color: #b45309; }
  .li-meta { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
  .type-badge { font-size: 9px; padding: 1px 5px; border-radius: 4px; font-weight: 600; }
  .li-stat { font-size: 10px; color: #94a3b8; }
  .li-dot { font-size: 10px; color: #cbd5e1; }
  .list-footer { padding: 10px; border-top: 1px solid #e2e8f0; }
  .new-btn-dashed { width: 100%; padding: 8px; border: 1px dashed #e2e8f0; border-radius: 6px; background: #f8fafc; font-size: 12px; color: #64748b; cursor: pointer; }
  /* Right detail */
  .right-detail { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .detail-head { padding: 14px 18px; border-bottom: 1px solid #e2e8f0; background: #fff; }
  .detail-breadcrumb { font-size: 11px; color: #64748b; margin-bottom: 8px; display: flex; align-items: center; gap: 4px; cursor: pointer; }
  .detail-title-row { display: flex; justify-content: space-between; align-items: center; }
  .detail-avatar { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; flex-shrink: 0; }
  .detail-title { font-size: 15px; font-weight: 700; color: #0f172a; }
  .detail-sub { font-size: 11px; color: #64748b; margin-top: 2px; display: flex; gap: 8px; align-items: center; }
  .detail-tabs { display: flex; gap: 0; margin-top: 12px; border-bottom: none; }
  .dtab { padding: 5px 14px 5px 0; font-size: 12px; font-weight: 500; background: none; border: none; cursor: pointer; color: #94a3b8; border-bottom: 2px solid transparent; }
  .dtab.active { color: #059669; border-bottom-color: #059669; }
  .detail-body { flex: 1; overflow-y: auto; padding: 18px; background: #f8fafc; }
  /* Cards */
  .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 16px; margin-bottom: 14px; }
  .card-title { font-size: 10px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; }
  .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 10px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
  .field input, .field select, .field textarea { width: 100%; padding: 7px 9px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 12px; background: #fff; color: #0f172a; outline: none; font-family: inherit; }
  .field textarea { resize: vertical; }
  /* Activity feed */
  .activity-add { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .activity-add textarea { width: 100%; padding: 8px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 12px; resize: none; font-family: inherit; outline: none; }
  .activity-add-row { display: flex; gap: 6px; }
  .activity-add-row select { flex: 1; padding: 5px 8px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 11px; background: #fff; outline: none; }
  .activity-add-row button { padding: 5px 12px; background: #0f172a; color: #fff; border: none; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; }
  .note-card { padding: 9px 10px; border-radius: 7px; border: 1px solid; margin-bottom: 6px; position: relative; }
  .note-card-type { font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 4px; color: #fff; display: inline-block; margin-bottom: 4px; }
  .note-card-text { font-size: 12px; line-height: 1.5; }
  .note-card-meta { font-size: 10px; margin-top: 4px; opacity: .7; }
  .note-card-del { position: absolute; top: 7px; right: 8px; background: none; border: none; font-size: 13px; cursor: pointer; opacity: .5; line-height: 1; }
  .note-card-del:hover { opacity: 1; }
  /* Contacts table */
  .sub-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; border-bottom: 1px solid #e2e8f0; background: #fff; }
  .sub-title { font-size: 11px; font-weight: 700; color: #475569; }
  .btn-sm-green { padding: 5px 12px; background: #059669; color: #fff; border: none; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { padding: 8px 12px; text-align: left; font-weight: 600; color: #64748b; font-size: 10px; text-transform: uppercase; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
  td { padding: 9px 12px; border-bottom: 1px solid #f1f5f9; }
  /* Props toolbar */
  .prop-toolbar { display: flex; gap: 6px; align-items: center; padding: 10px 0; flex-wrap: wrap; }
  .prop-toolbar select { padding: 5px 8px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 11px; background: #fff; outline: none; }
  /* Contacts tab layout */
  .contacts-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .contacts-toolbar { padding: 10px 14px; border-bottom: 1px solid #e2e8f0; background: #fff; display: flex; gap: 7px; align-items: center; flex-wrap: wrap; }
  .contacts-table-wrap { flex: 1; overflow-y: auto; }
  /* Contact right panel */
  .con-right { width: 300px; border-left: 1px solid #e2e8f0; display: flex; flex-direction: column; flex-shrink: 0; }
  .con-right-head { padding: 12px 14px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
  .con-right-body { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
  .con-avatar { width: 36px; height: 36px; border-radius: 50%; background: #e0f2fe; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #0369a1; flex-shrink: 0; }
  .activity-section { border-top: 1px solid #f1f5f9; padding-top: 10px; }
  .section-label { font-size: 10px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
  /* Recent badge */
  .recent { color: #059669 !important; font-weight: 600; }
  /* Empty */
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 8px; color: #94a3b8; }
  .empty-state svg { width: 32px; height: 32px; opacity: .3; }
  .empty-state p { font-size: 14px; font-weight: 500; }
  .empty-state small { font-size: 12px; }
  /* Util */
  .flex-row { display: flex; align-items: center; gap: 8px; }
  .hidden { display: none; }
  .link-prop-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .link-prop-row span { font-size: 12px; color: #64748b; font-weight: 600; }
  .link-prop-row select { padding: 6px 9px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 12px; background: #fff; min-width: 200px; outline: none; }
</style>
</head>
<body>
<div class="shell">
  <!-- Nav sidebar -->
  <div class="sidebar-nav">
    <div class="sidebar-logo">
      <h1>Property CRM</h1>
      <p>AA Investment Partners</p>
    </div>
    <button class="nav-item">🏠 Dashboard</button>
    <button class="nav-item">🏗️ Pipeline</button>
    <button class="nav-item active" id="nav-companies">🏢 Companies &amp; Contacts</button>
    <button class="nav-item">📋 Tasks</button>
    <button class="nav-item">🔧 Refurb Quotes</button>
  </div>

  <div class="main">
    <!-- Tab bar -->
    <div class="topbar">
      <button class="tab-btn active" id="tab-companies" onclick="switchTab('companies')">Companies</button>
      <button class="tab-btn" id="tab-contacts" onclick="switchTab('contacts')">Contacts</button>
    </div>

    <div class="content">
      <!-- =============== COMPANIES VIEW =============== -->
      <div id="view-companies" class="panel">

        <!-- Left list -->
        <div class="left-list">
          <div class="left-list-head">
            <!-- Search -->
            <div class="search-wrap">
              <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              <input type="text" placeholder="Search companies…" oninput="filterCompanies(this.value)" id="comp-search">
            </div>
            <!-- Sort + Type -->
            <div class="filter-row">
              <select class="filter-sel" onchange="filterCompanies()" id="comp-sort" title="Sort">
                <option value="newest">Newest first</option>
                <option value="oldest">Oldest first</option>
                <option value="az">A → Z</option>
                <option value="za">Z → A</option>
                <option value="contacts">Most contacts</option>
                <option value="properties">Most properties</option>
              </select>
              <select class="filter-sel" onchange="filterCompanies()" id="comp-type" title="Type">
                <option value="ALL">All types</option>
                <option value="Auction House">Auction House</option>
                <option value="Builder">Builder</option>
                <option value="Estate Agent">Estate Agent</option>
                <option value="Letting Agent">Letting Agent</option>
                <option value="Mortgage Broker">Mortgage Broker</option>
                <option value="Solicitor">Solicitor</option>
                <option value="Surveyor">Surveyor</option>
                <option value="Trade / Contractor">Trade / Contractor</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <!-- City -->
            <div class="filter-row">
              <select class="filter-sel" onchange="filterCompanies()" id="comp-city" title="City" style="flex:1">
                <option value="ALL">All cities</option>
                <option value="London">London</option>
                <option value="Sheffield">Sheffield</option>
                <option value="Edinburgh">Edinburgh</option>
                <option value="Coventry">Coventry</option>
              </select>
            </div>
            <!-- Has contacts -->
            <div class="toggle-group" style="gap:4px;align-items:center">
              <label>Contacts</label>
              <button class="tgl on" onclick="setToggle('contacts','ALL',this)">All</button>
              <button class="tgl" onclick="setToggle('contacts','yes',this)">Yes</button>
              <button class="tgl" onclick="setToggle('contacts','no',this)">No</button>
            </div>
            <!-- Has properties -->
            <div class="toggle-group" style="gap:4px;align-items:center">
              <label>Properties</label>
              <button class="tgl on" onclick="setToggle('props','ALL',this)">All</button>
              <button class="tgl" onclick="setToggle('props','yes',this)">Yes</button>
              <button class="tgl" onclick="setToggle('props','no',this)">No</button>
            </div>
            <!-- Meta row -->
            <div class="filter-meta">
              <span class="filter-count" id="comp-count">6 of 6 companies</span>
              <button class="clear-btn" onclick="clearCompFilters()">Clear filters</button>
            </div>
          </div>

          <div class="list-items" id="comp-list"></div>

          <div class="list-footer">
            <button class="new-btn-dashed" onclick="showNewCompany()">+ New company</button>
          </div>
        </div>

        <!-- Right detail -->
        <div class="right-detail" id="comp-detail">
          <div class="empty-state">
            <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M3 21h18M9 21V11l6-5 6 5v10"/><rect x="9" y="14" width="6" height="7"/></svg>
            <p>Select a company</p>
            <small>or click + New company below the list</small>
          </div>
        </div>
      </div>

      <!-- =============== CONTACTS VIEW =============== -->
      <div id="view-contacts" class="panel hidden" style="flex-direction:column">
        <div class="contacts-toolbar">
          <div class="search-wrap" style="flex:1;min-width:160px">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" placeholder="Search contacts…" id="con-search" oninput="filterContacts()" style="width:100%;padding:7px 7px 7px 26px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;background:#f8fafc;outline:none">
          </div>
          <select style="padding:6px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:11px;background:#fff;outline:none" onchange="filterContacts()" id="con-sort">
            <option value="newest">Newest added</option>
            <option value="oldest">Oldest first</option>
            <option value="az">A → Z</option>
            <option value="za">Z → A</option>
            <option value="activity">Last activity</option>
          </select>
          <select style="padding:6px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:11px;background:#fff;outline:none" onchange="filterContacts()" id="con-role">
            <option value="ALL">All roles</option>
            <option value="Agent">Agent</option>
            <option value="Solicitor">Solicitor</option>
            <option value="Surveyor">Surveyor</option>
            <option value="Broker">Broker</option>
            <option value="Contractor">Contractor</option>
            <option value="Investor">Investor</option>
            <option value="Other">Other</option>
          </select>
          <select style="padding:6px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:11px;background:#fff;outline:none" onchange="filterContacts()" id="con-company">
            <option value="ALL">All companies</option>
            <option value="1">Allsop LLP</option>
            <option value="2">Savills</option>
            <option value="3">DM Hall</option>
            <option value="4">Brindley Twist Tafft &amp; James</option>
            <option value="5">RJ Property Services</option>
          </select>
          <div class="toggle-group" style="align-items:center;gap:3px">
            <label style="font-size:10px;font-weight:600;color:#64748b;margin-right:2px">Notes</label>
            <button class="tgl on" onclick="setConToggle('notes','ALL',this)">All</button>
            <button class="tgl" onclick="setConToggle('notes','yes',this)">Has notes</button>
            <button class="tgl" onclick="setConToggle('notes','no',this)">None</button>
          </div>
          <span style="font-size:10px;color:#94a3b8" id="con-count">5 of 5 contacts</span>
          <button class="clear-btn" onclick="clearConFilters()">Clear</button>
          <button class="btn-sm-green" style="margin-left:auto">+ New contact</button>
        </div>
        <div style="flex:1;display:flex;overflow:hidden">
          <div class="contacts-table-wrap" id="con-table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Name</th><th>Job Title</th><th>Company</th><th>Role</th><th>Email</th><th>Phone</th><th>Last activity</th><th></th>
                </tr>
              </thead>
              <tbody id="con-tbody"></tbody>
            </table>
          </div>
          <!-- Contact right panel -->
          <div class="con-right hidden" id="con-right-panel">
            <div class="con-right-head">
              <div class="flex-row">
                <div class="con-avatar" id="con-avatar-initials"></div>
                <div>
                  <div style="font-size:13px;font-weight:600;color:#0f172a" id="con-panel-name"></div>
                  <div style="font-size:11px;color:#64748b" id="con-panel-title"></div>
                </div>
              </div>
              <button onclick="document.getElementById('con-right-panel').classList.add('hidden')" style="background:none;border:none;cursor:pointer;color:#94a3b8;font-size:18px;line-height:1">×</button>
            </div>
            <div class="con-right-body" id="con-panel-body">
              <!-- Rendered by JS -->
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

const NOTE_BG     = { Call:'#e0f2fe', Meeting:'#ede9fe', Email:'#fefce8', Review:'#eeedfe', 'Survey update':'#e1f5ee', Legal:'#faeeda', Finance:'#e6f1fb', Task:'#ede9fe', Flag:'#fcebeb' };

function typeBadgeStyle(type) {
  const map = { 'Auction House': 'background:#dcfce7;color:#166534', 'Solicitor': 'background:#eff6ff;color:#1d4ed8', 'Surveyor': 'background:#fff7ed;color:#c2410c', 'Builder': 'background:#f5f3ff;color:#6d28d9', 'Estate Agent': 'background:#f0f9ff;color:#0369a1', 'Mortgage Broker': 'background:#fdf4ff;color:#7c3aed', 'Letting Agent': 'background:#fef9ee;color:#b45309', 'Trade / Contractor': 'background:#fef3c7;color:#92400e' };
  return map[type] || 'background:#f1f5f9;color:#475569';
}
function tierBadge(tier) {
  if (!tier) return '';
  const cls = { Gold:'tier-gold', Silver:'tier-silver', Bronze:'tier-bronze' }[tier] || '';
  return `<span class="tier-badge ${cls}">${tier}</span>`;
}
function compProps(c) { return properties.filter(p => (p.linkedCompanyIds||[]).includes(c.id)).length; }
function compContacts(c) { return contacts.filter(x => x.companyId === c.id).length; }
function compLastNote(c) { return globalNotes.filter(n=>n.targetType==='company'&&n.targetId===c.id).sort((a,b)=>b.date.localeCompare(a.date))[0]?.date || null; }
function contactLastNote(con) { return globalNotes.filter(n=>n.targetType==='Contact'&&n.targetId===con.id).sort((a,b)=>b.date.localeCompare(a.date))[0]?.date || null; }
function isRecent(d) { return d && (new Date() - new Date(d)) < 7*86400000; }
function initials(name) { return name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase(); }

function switchTab(t) {
  document.getElementById('view-companies').classList.toggle('hidden', t!=='companies');
  document.getElementById('view-contacts').classList.toggle('hidden', t!=='contacts');
  document.getElementById('tab-companies').classList.toggle('active', t==='companies');
  document.getElementById('tab-contacts').classList.toggle('active', t!=='companies');
  if (t==='contacts') renderContactsTable();
}

let compToggleContacts='ALL', compToggleProps='ALL';
function setToggle(group,val,el) {
  if (group==='contacts') compToggleContacts=val;
  else compToggleProps=val;
  el.closest('.toggle-group').querySelectorAll('.tgl').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  filterCompanies();
}
function filterCompanies(q) {
  const query = (q !== undefined ? q : document.getElementById('comp-search').value).toLowerCase();
  const type = document.getElementById('comp-type').value;
  const city = document.getElementById('comp-city').value;
  const sort = document.getElementById('comp-sort').value;
  let list = companies.filter(c => {
    if (type !== 'ALL' && c.type !== type) return false;
    if (city !== 'ALL' && c.city !== city) return false;
    if (compToggleContacts==='yes' && compContacts(c)===0) return false;
    if (compToggleContacts==='no'  && compContacts(c)>0) return false;
    if (compToggleProps==='yes' && compProps(c)===0) return false;
    if (compToggleProps==='no'  && compProps(c)>0) return false;
    if (query) return [c.name,c.city,c.phone,c.type].join(' ').toLowerCase().includes(query);
    return true;
  }).sort((a,b)=>{
    if (sort==='az') return a.name.localeCompare(b.name);
    if (sort==='za') return b.name.localeCompare(a.name);
    if (sort==='newest') return b.id-a.id;
    if (sort==='oldest') return a.id-b.id;
    if (sort==='contacts') return compContacts(b)-compContacts(a);
    if (sort==='properties') return compProps(b)-compProps(a);
    return 0;
  });
  document.getElementById('comp-count').textContent = `${list.length} of ${companies.length} compan${companies.length!==1?'ies':'y'}`;
  const el = document.getElementById('comp-list');
  el.innerHTML = list.map(c => {
    const pc = compProps(c), cc = compContacts(c), ln = compLastNote(c);
    const meta = [
      cc > 0 ? `${cc} contact${cc!==1?'s':''}` : null,
      pc > 0 ? `${pc} propert${pc!==1?'ies':'y'}` : null,
      ln ? `Last note: ${ln}` : null,
    ].filter(Boolean).join(' · ');
    return `<div class="list-item${c.id===selectedCompanyId?' active':''}" onclick="selectCompany(${c.id})">
      <div class="li-name-row">
        <span class="li-name">${c.name}</span>${tierBadge(c.tier)}
      </div>
      <div class="li-meta">
        <span class="type-badge" style="${typeBadgeStyle(c.type)}">${c.type}</span>
        ${meta ? `<span class="li-stat">${meta}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}
function clearCompFilters() {
  document.getElementById('comp-search').value='';
  document.getElementById('comp-sort').value='newest';
  document.getElementById('comp-type').value='ALL';
  document.getElementById('comp-city').value='ALL';
  compToggleContacts='ALL'; compToggleProps='ALL';
  document.querySelectorAll('.toggle-group .tgl').forEach((b,i)=>{ b.classList.toggle('on', i%3===0); });
  filterCompanies('');
}

let conNotesToggle='ALL';
function setConToggle(group,val,el) {
  conNotesToggle=val;
  el.closest('.toggle-group').querySelectorAll('.tgl').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');

function clearConFilters() {
  document.getElementById('con-search').value='';
  document.getElementById('con-sort').value='newest';
  document.getElementById('con-role').value='ALL';
  document.getElementById('con-company').value='ALL';
  conNotesToggle='ALL';
  document.querySelectorAll('#view-contacts .toggle-group .tgl').forEach((b,i)=>b.classList.toggle('on',i%3===0));
  filterContacts();
}
function filterContacts() {
  const q = document.getElementById('con-search').value.toLowerCase();
  const role = document.getElementById('con-role').value;
  const co = document.getElementById('con-company').value;
  const sort = document.getElementById('con-sort').value;
  let list = contacts.filter(con => {
    if (role !== 'ALL' && con.role !== role) return false;
    if (co !== 'ALL' && String(con.companyId||'') !== co) return false;
    const hasNotes = globalNotes.filter(n=>n.targetType==='Contact'&&n.targetId===con.id).length > 0;
    if (conNotesToggle==='yes' && !hasNotes) return false;
    if (conNotesToggle==='no'  && hasNotes) return false;
    if (q) {
      const hay = [con.name,con.email,con.phone,con.jobTitle,con.role,con.origin, companies.find(c=>c.id===con.companyId)?.name||''].join(' ').toLowerCase();
      return hay.includes(q);
    }
    return true;
  }).sort((a,b)=>{
    if (sort==='az') return a.name.localeCompare(b.name);
    if (sort==='za') return b.name.localeCompare(a.name);
    if (sort==='oldest') return a.id-b.id;
    if (sort==='activity') {
      const last = x=>globalNotes.filter(n=>n.targetType==='Contact'&&n.targetId===x.id).sort((p,q)=>q.date.localeCompare(p.date))[0]?.date||'';
      return last(b).localeCompare(last(a));
    }
    return b.id-a.id;
  });
  document.getElementById('con-count').textContent = `${list.length} of ${contacts.length} contact${contacts.length!==1?'s':''}`;
  const roleColors = { Surveyor:'background:#eff6ff;color:#1d4ed8', Agent:'background:#f0fdf4;color:#166534', Solicitor:'background:#fdf4ff;color:#7c3aed', Broker:'background:#fef3c7;color:#92400e', Contractor:'background:#fff7ed;color:#c2410c', Investor:'background:#ecfdf5;color:#065f46', Other:'background:#f8fafc;color:#475569' };
  document.getElementById('con-tbody').innerHTML = list.map(con => {
    const co = companies.find(c=>c.id===con.companyId);
    const ln = contactLastNote(con);
    const lastDisplay = ln || con.lastActivity || '—';
    const recent = isRecent(lastDisplay);
    return `<tr onclick="selectContact(${con.id})" style="cursor:pointer;background:${con.id===selectedContactId?'#f0fdf4':'#fff'}">
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:28px;height:28px;border-radius:50%;background:#e0f2fe;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#0369a1;flex-shrink:0">${initials(con.name)}</div>
          <span style="font-weight:600;color:#0f172a">${con.name}</span>
        </div>
      </td>
      <td style="color:#475569">${con.jobTitle}</td>
      <td>${co?`<span style="font-size:11px;padding:2px 6px;border-radius:4px;background:#f0fdf4;color:#065f46;font-weight:500">${co.name}</span>`:'<span style="color:#94a3b8">—</span>'}</td>
      <td>${con.role?`<span style="font-size:10px;padding:1px 6px;border-radius:4px;font-weight:600;${roleColors[con.role]||''}">${con.role}</span>`:'<span style="color:#94a3b8">—</span>'}</td>
      <td style="color:#475569;font-size:11px">${con.email||'—'}</td>
      <td style="color:#047857;font-size:11px">${con.phone||'—'}</td>
      <td style="font-size:11px;${recent?'color:#059669;font-weight:600':'color:#94a3b8'}">${lastDisplay}</td>
      <td style="color:#fca5a5;cursor:pointer">🗑</td>
    </tr>`;
  }).join('');
}

      <div class="section-label">Activity notes</div>
      ${conNotes.map(n=>`
        <div class="note-card" style="background:${NOTE_BG[n.type]||'#f8fafc'};color:${NOTE_TEXT[n.type]||'#475569'};border-color:${NOTE_COLORS[n.type]||'#e2e8f0'}33">
          <button class="note-card-del" title="Delete">×</button>
          <span class="note-card-type" style="background:${NOTE_COLORS[n.type]||'#94a3b8'}">${n.type}</span>
          <div class="note-card-text">${n.text}</div>
          <div class="note-card-meta">${n.author} · ${n.date}</div>
        </div>
      `).join('')}
      ${conNotes.length===0?'<p style="font-size:12px;color:#94a3b8">No notes yet</p>':''}
      <div class="activity-add" style="margin-top:8px">
        <textarea rows="3" placeholder="Add a note…"></textarea>
        <div class="activity-add-row">
          <select>
            <option>📞 Call</option><option>🤝 Meeting</option><option>✉️ Email</option>
            <option>📋 Review</option><option>📝 Task</option><option>🚩 Flag</option>
          </select>
          <button>Add</button>
        </div>
      </div>
    </div>
  `;
  filterContacts();
}
function renderContactsTable() { filterContacts(); }

// ============================================================

// ============================================================
filterCompanies();
</script>
</body>
