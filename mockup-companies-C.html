<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; color: #0f172a; height: 100vh; display: flex; overflow: hidden; }
  .sidebar-nav { width: 200px; background: #0f172a; flex-shrink: 0; display: flex; flex-direction: column; }
  .sidebar-logo { padding: 18px 16px; border-bottom: 1px solid #1e293b; }
  .sidebar-logo h1 { font-size: 13px; font-weight: 700; color: #fff; }
  .sidebar-logo p { font-size: 10px; color: #64748b; margin-top: 2px; }
  .nav-item { display: flex; align-items: center; gap: 9px; padding: 9px 16px; font-size: 12px; font-weight: 500; color: #94a3b8; cursor: pointer; border: none; background: none; width: 100%; text-align: left; }
  .nav-item.active { color: #fff; background: #1e293b; border-left: 3px solid #059669; padding-left: 13px; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
  /* Top bar */
  .topbar { padding: 0 24px; background: #fff; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; flex-shrink: 0; }
  .tab-btn { padding: 14px 18px; font-size: 13px; font-weight: 600; background: none; border: none; cursor: pointer; color: #64748b; border-bottom: 2px solid transparent; }
  .tab-btn.active { color: #059669; border-bottom-color: #059669; }
  /* Filter bar */
  .filter-bar { padding: 10px 20px; background: #fff; border-bottom: 1px solid #e2e8f0; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
  .search-wrap { position: relative; }
  .search-wrap input { padding: 7px 10px 7px 30px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 12px; background: #f8fafc; outline: none; width: 200px; }
  .search-wrap svg { position: absolute; top: 8px; left: 8px; color: #94a3b8; width: 13px; height: 13px; pointer-events: none; }
  select.f { padding: 6px 9px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 11px; background: #fff; outline: none; }
  .tgl-row { display: flex; gap: 3px; align-items: center; }
  .tgl-row label { font-size: 10px; font-weight: 600; color: #64748b; margin-right: 2px; }
  .tgl { padding: 5px 9px; border-radius: 4px; font-size: 10px; font-weight: 600; cursor: pointer; border: 1px solid #e2e8f0; background: #f1f5f9; color: #64748b; }
  .tgl.on { background: #0f172a; color: #fff; border-color: #0f172a; }
  .filter-meta { font-size: 10px; color: #94a3b8; }
  .clear-btn { font-size: 10px; color: #059669; background: none; border: none; cursor: pointer; font-weight: 600; }
  .btn-primary { padding: 7px 14px; background: #059669; color: #fff; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
  /* Full-width table */
  .table-wrap { flex: 1; overflow-y: auto; padding: 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; background: #fff; border-radius: 10px; border: 1px solid #e2e8f0; overflow: hidden; }
  thead { position: sticky; top: 0; z-index: 2; }
  th { padding: 10px 14px; text-align: left; font-weight: 600; color: #64748b; font-size: 10px; text-transform: uppercase; background: #f8fafc; border-bottom: 1px solid #e2e8f0; white-space: nowrap; cursor: pointer; user-select: none; }
  th:hover { color: #0f172a; }
  th .sort-arrow { margin-left: 4px; opacity: .4; font-style: normal; }
  th.sorted .sort-arrow { opacity: 1; color: #059669; }
  td { padding: 11px 14px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8fafc; }
  tr.active-row td { background: #f0fdf4; }
  .badge { display: inline-block; font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 700; }
  .tier-gold   { background: #fef3c7; color: #92400e; }
  .tier-silver { background: #f1f5f9; color: #475569; }
  .tier-bronze { background: #fff7ed; color: #b45309; }
  .stat-chips { display: flex; gap: 5px; }
  .stat-chip { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 600; }
  /* Slide-in drawer */
  .drawer-overlay { position: fixed; inset: 0; background: rgba(15,23,42,.25); z-index: 50; opacity: 0; pointer-events: none; transition: opacity .2s; }
  .drawer-overlay.open { opacity: 1; pointer-events: all; }
  .drawer { position: fixed; top: 0; right: -500px; width: 480px; height: 100vh; background: #fff; border-left: 1px solid #e2e8f0; z-index: 51; display: flex; flex-direction: column; box-shadow: -4px 0 24px rgba(0,0,0,.1); transition: right .2s ease; }
  .drawer.open { right: 0; }
  .drawer-head { padding: 16px 20px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: flex-start; flex-shrink: 0; }
  .drawer-avatar { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; flex-shrink: 0; }
  .drawer-title { font-size: 15px; font-weight: 700; color: #0f172a; margin-bottom: 3px; }
  .drawer-sub { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .drawer-close { background: none; border: none; font-size: 20px; color: #94a3b8; cursor: pointer; line-height: 1; padding: 2px; }
  .drawer-tabs { display: flex; padding: 0 20px; border-bottom: 1px solid #e2e8f0; background: #fafafa; flex-shrink: 0; }
  .dtab { padding: 9px 14px 9px 0; font-size: 12px; font-weight: 500; background: none; border: none; cursor: pointer; color: #94a3b8; border-bottom: 2px solid transparent; }
  .dtab.active { color: #059669; border-bottom-color: #059669; }
  .drawer-body { flex: 1; overflow-y: auto; padding: 18px 20px; background: #f8fafc; }
  /* Drawer inner */
  .dcard { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 16px; margin-bottom: 14px; }
  .dcard-title { font-size: 10px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; }
  .dgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .dfield { margin-bottom: 10px; }
  .dfield label { display: block; font-size: 10px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
  .dfield input, .dfield select, .dfield textarea { width: 100%; padding: 7px 9px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 12px; background: #fff; color: #0f172a; outline: none; font-family: inherit; }
  /* Note cards */
  .note-card { padding: 9px 10px; border-radius: 7px; border: 1px solid; margin-bottom: 6px; position: relative; }
  .note-type-badge { font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 4px; color: #fff; display: inline-block; margin-bottom: 4px; }
  .note-del { position: absolute; top: 7px; right: 8px; background: none; border: none; font-size: 13px; cursor: pointer; opacity: .4; line-height: 1; }
  .act-add textarea { width: 100%; padding: 8px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 12px; resize: none; font-family: inherit; outline: none; margin-bottom: 6px; }
  .act-row { display: flex; gap: 6px; }
  .act-row select { flex: 1; padding: 5px 8px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 11px; background: #fff; outline: none; }
  .act-row button { padding: 5px 12px; background: #0f172a; color: #fff; border: none; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; }
  /* Contact table specifics */
  .con-avatar-sm { width: 28px; height: 28px; border-radius: 50%; background: #e0f2fe; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #0369a1; flex-shrink: 0; }
  /* Contact drawer */
  .con-drawer-avatar { width: 40px; height: 40px; border-radius: 50%; background: #e0f2fe; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #0369a1; }
  .hidden { display: none; }
</style>
</head>

let activeCoId=null,activeCoTab='overview',activeConId=null;
let coSortKey='newest',coSortDir=1,conSortKey='newest',conSortDir=1;

function setTgl(g,v,el){ if(g==='cc')tglCC=v; else tglCP=v; el.closest('.tgl-row').querySelectorAll('.tgl').forEach(b=>b.classList.remove('on')); el.classList.add('on'); renderCo(); }
function setConTgl(g,v,el){ tglConNotes=v; el.closest('.tgl-row').querySelectorAll('.tgl').forEach(b=>b.classList.remove('on')); el.classList.add('on'); renderCon(); }
function clearCo(){ document.getElementById('cos').value=''; document.getElementById('cosort').value='newest'; document.getElementById('cotype').value='ALL'; document.getElementById('cocity').value='ALL'; tglCC='ALL';tglCP='ALL'; document.querySelectorAll('#view-co .tgl').forEach((b,i)=>b.classList.toggle('on',i%3===0)); renderCo(); }
function clearCon(){ document.getElementById('cons').value=''; document.getElementById('consort').value='newest'; document.getElementById('conrole').value='ALL'; document.getElementById('conco').value='ALL'; tglConNotes='ALL'; document.querySelectorAll('#view-con .tgl').forEach((b,i)=>b.classList.toggle('on',i%3===0)); renderCon(); }

function switchTab(t){
  document.getElementById('view-co').style.display=t==='companies'?'flex':'none';
  document.getElementById('view-con').style.display=t==='contacts'?'flex':'none';
  document.getElementById('tab-co').classList.toggle('active',t==='companies');
  document.getElementById('tab-con').classList.toggle('active',t==='contacts');
  closeDrawer();
  if(t==='contacts') renderCon();
}

function coSortCol(key){
  if(coSortKey===key) coSortDir*=-1; else { coSortKey=key; coSortDir=1; }
  document.querySelectorAll('th[id^="cth-"]').forEach(th=>{
    th.classList.remove('sorted');
    th.querySelector('.sort-arrow').textContent='↕';
  });
  const el=document.getElementById('cth-'+key);
  if(el){ el.classList.add('sorted'); el.querySelector('.sort-arrow').textContent=coSortDir===1?'↑':'↓'; }
  renderCo();
}
function conSortCol(key){
  if(conSortKey===key) conSortDir*=-1; else { conSortKey=key; conSortDir=1; }
  document.querySelectorAll('th[id^="cnth-"]').forEach(th=>{ th.classList.remove('sorted'); th.querySelector('.sort-arrow').textContent='↕'; });
  const el=document.getElementById('cnth-'+key);
  if(el){ el.classList.add('sorted'); el.querySelector('.sort-arrow').textContent=conSortDir===1?'↑':'↓'; }
  renderCon();
}

function renderCo(){
  const q=(document.getElementById('cos').value||'').toLowerCase();
  const type=document.getElementById('cotype').value;
  const city=document.getElementById('cocity').value;
  const sort=document.getElementById('cosort').value;
  let list=companies.filter(c=>{
    if(type!=='ALL'&&c.type!==type) return false;
    if(city!=='ALL'&&c.city!==city) return false;
    if(tglCC==='yes'&&compCons(c)===0) return false;
    if(tglCC==='no'&&compCons(c)>0) return false;
    if(tglCP==='yes'&&compProps(c)===0) return false;
    if(tglCP==='no'&&compProps(c)>0) return false;
    if(q) return [c.name,c.city,c.type,c.phone].join(' ').toLowerCase().includes(q);
    return true;
  }).sort((a,b)=>{
    let v=0;
    if(coSortKey==='name') v=a.name.localeCompare(b.name);
    else if(coSortKey==='type') v=a.type.localeCompare(b.type);
    else if(coSortKey==='tier') v=(a.tier||'').localeCompare(b.tier||'');
    else if(coSortKey==='city') v=(a.city||'').localeCompare(b.city||'');
    else if(coSortKey==='contacts') v=compCons(a)-compCons(b);
    else if(coSortKey==='properties') v=compProps(a)-compProps(b);
    else if(sort==='az') return a.name.localeCompare(b.name);
    else if(sort==='za') return b.name.localeCompare(a.name);
    else if(sort==='contacts') return compCons(b)-compCons(a);
    else if(sort==='properties') return compProps(b)-compProps(a);
    else v=b.id-a.id;
    return v*coSortDir;
  });
  document.getElementById('cometa').textContent=`${list.length} of ${companies.length} compan${companies.length!==1?'ies':'y'}`;
  document.getElementById('co-tbody').innerHTML=list.map(c=>{
    const cc=compCons(c),pc=compProps(c),ln=compLN(c);
    return`<tr onclick="openCo(${c.id})" style="cursor:pointer;${c.id===activeCoId?'background:#f0fdf4;':''}" onmouseenter="if(${c.id}!==${activeCoId})this.style.background='#f8fafc'" onmouseleave="if(${c.id}!==${activeCoId})this.style.background=''">
      <td>
        <div style="display:flex;align-items:center;gap:9px">
          <div style="width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;${typeStyle(c.type)}">${c.name[0]}</div>
          <span style="font-weight:600;color:#0f172a">${c.name}</span>
        </div>
      </td>
      <td><span class="badge" style="${typeStyle(c.type)}">${c.type}</span></td>
      <td>${c.tier?`<span class="badge ${tierStyle(c.tier)}">${c.tier}</span>`:'<span style="color:#94a3b8">—</span>'}</td>
      <td style="color:#475569;font-size:11px">${c.city||'—'}</td>
      <td>
        <div class="stat-chips">
          ${cc>0?`<span class="stat-chip" style="background:#f0fdf4;color:#065f46">${cc} contact${cc!==1?'s':''}</span>`:'<span style="color:#94a3b8;font-size:11px">0</span>'}
        </div>
      </td>
      <td>
        <div class="stat-chips">
          ${pc>0?`<span class="stat-chip" style="background:#eff6ff;color:#1d4ed8">${pc} propert${pc!==1?'ies':'y'}</span>`:'<span style="color:#94a3b8;font-size:11px">0</span>'}
        </div>
      </td>
      <td style="font-size:11px;color:#94a3b8">${ln||'—'}</td>
      <td>
        <button onclick="event.stopPropagation();openCo(${c.id})" style="padding:4px 10px;border:1px solid #e2e8f0;border-radius:5px;background:#f8fafc;font-size:11px;color:#475569;cursor:pointer;font-weight:500">Open →</button>
      </td>
    </tr>`;
  }).join('');
}

function openCo(id){
  activeCoId=id; activeCoTab='overview';
  renderCo();
  const c=companies.find(x=>x.id===id);
  const ts=typeStyle(c.type);
  document.getElementById('co-drw-avatar').style=ts+';width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700';
  document.getElementById('co-drw-avatar').textContent=c.name[0];
  document.getElementById('co-drw-name').textContent=c.name;
  document.getElementById('co-drw-sub').innerHTML=`<span class="badge" style="${ts}">${c.type}</span>${c.phone?`<span style="font-size:11px;color:#64748b">${c.phone}</span>`:''}${c.tier?`<span class="badge ${tierStyle(c.tier)}">${c.tier}</span>`:''}`;
  renderCoDrawerTabs(c);
  openDrawer('co');
}
function renderCoDrawerTabs(c){
  const linked=contacts.filter(x=>x.companyId===c.id);
  const lprops=properties.filter(p=>(p.linkedCompanyIds||[]).includes(c.id));
  document.getElementById('co-drw-tabs').innerHTML=['overview','contacts','properties','costs'].map(t=>`<button class="dtab${t===activeCoTab?' active':''}" onclick="setCoTab('${t}')">${t.charAt(0).toUpperCase()+t.slice(1)}${t==='contacts'?` (${linked.length})`:t==='properties'?` (${lprops.length})`:''}</button>`).join('');
  renderCoDrawerBody(c,linked,lprops);
}
function setCoTab(t){ activeCoTab=t; const c=companies.find(x=>x.id===activeCoId); if(c) renderCoDrawerTabs(c); }

function renderCoDrawerBody(c,linked,lprops){
  const notes=globalNotes.filter(n=>n.targetType==='company'&&n.targetId===c.id).sort((a,b)=>b.date.localeCompare(a.date));
  let html='';
  if(activeCoTab==='overview'){
    html=`
      <div class="dcard">
        <div class="dcard-title">Company details</div>
        ${df('Company name',c.name)} ${dsel('Type',c.type)} ${dsel('Relationship tier',c.tier||'',['','Gold','Silver','Bronze'],['— None —','Gold','Silver','Bronze'])}
        ${df('Phone',c.phone)} ${df('Website',c.website||'')} ${df('City',c.city)}
      </div>
      <div class="dcard">
        <div class="dcard-title">Activity notes</div>
        <div class="act-add"><textarea rows="2" placeholder="Add a note…"></textarea>
          <div class="act-row"><select><option>📞 Call</option><option>🤝 Meeting</option><option>✉️ Email</option><option>📋 Review</option><option>⚖️ Legal</option><option>💰 Finance</option></select><button>Add</button></div>
        </div>
        ${notes.map(n=>`<div class="note-card" style="background:${NOTE_BG[n.type]||'#f8fafc'};color:${NOTE_TEXT[n.type]||'#475569'};border-color:${NOTE_COLORS[n.type]||'#e2e8f0'}33">
          <button class="note-del">×</button>
          <span class="note-type-badge" style="background:${NOTE_COLORS[n.type]||'#94a3b8'}">${n.type}</span>
          <div style="font-size:12px;line-height:1.5">${n.text}</div>
          <div style="font-size:10px;margin-top:4px;opacity:.7">${n.author} · ${n.date}</div>
        </div>`).join('')}
        ${notes.length===0?'<p style="font-size:12px;color:#94a3b8">No notes yet</p>':''}
      </div>
    `;
  } else if(activeCoTab==='contacts'){
    html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span style="font-size:12px;font-weight:600;color:#475569">${linked.length} contact${linked.length!==1?'s':''}</span>
      <button class="btn-primary" style="font-size:11px;padding:5px 12px">+ Add contact</button>
    </div>
    <div class="dcard" style="padding:0;overflow:hidden">
      ${linked.length===0?'<p style="padding:24px;text-align:center;color:#94a3b8;font-size:13px">No contacts linked</p>':`<table><thead><tr><th>Name</th><th>Job Title</th><th>Email</th></tr></thead><tbody>${linked.map(x=>`<tr><td style="font-weight:600">${x.name}</td><td style="color:#64748b">${x.jobTitle}</td><td style="color:#475569;font-size:11px">${x.email}</td></tr>`).join('')}</tbody></table>`}
    </div>`;
  } else if(activeCoTab==='properties'){
    html=`<div style="display:flex;gap:6px;margin-bottom:10px;align-items:center;flex-wrap:wrap">
      <select class="f"><option>All statuses</option><option>Sourced</option><option>Due Diligence</option><option>Acquired</option><option>In Refurb</option></select>
      <select class="f"><option>Newest first</option><option>Guide price ↓</option><option>Auction date</option></select>
      <select class="f" style="flex:1;min-width:160px"><option value="">Link a property…</option><option>12 New St, Leeds</option><option>3 Oak Ave, Sheffield</option></select>
    </div>
    <div class="dcard" style="padding:0;overflow:hidden">
      ${lprops.length===0?'<p style="padding:24px;text-align:center;color:#94a3b8;font-size:13px">No properties linked</p>':`<table><thead><tr><th>Address</th><th>Status</th><th style="text-align:right">Guide</th><th></th></tr></thead><tbody>${lprops.map(p=>`<tr><td style="font-weight:600;color:#0284c7;cursor:pointer;font-size:11px">${p.address}</td><td><span class="badge" style="${typeStyle('Auction House')}">${p.status}</span></td><td style="text-align:right;font-weight:600">£${(p.guidePrice||0).toLocaleString()}</td><td><button style="background:none;border:none;cursor:pointer;font-size:10px;color:#94a3b8">Unlink</button></td></tr>`).join('')}</tbody></table>`}
    </div>`;
  } else {
    html=`<div class="dcard"><div class="dcard-title">Fees &amp; costs</div>${df("Buyer's premium",c.buyersPremium||'')}${df('Admin fee',c.adminFee||'')}${df('Legal fee',c.legalFee||'')}${df('Survey fee',c.surveyFee||'')}</div>`;
  }
  document.getElementById('co-drw-body').innerHTML=html;
}

function df(label,value,ph=''){return`<div class="dfield"><label>${label}</label><input type="text" value="${value||''}" placeholder="${ph||label}"></div>`;}
function dsel(label,value,opts,labels){opts=opts||['Auction House','Builder','Estate Agent','Solicitor','Surveyor','Other'];labels=labels||opts;return`<div class="dfield"><label>${label}</label><select>${opts.map((o,i)=>`<option value="${o}"${o===value?' selected':''}>${labels[i]||o}</option>`).join('')}</select></div>`;}

// Contacts table
function renderCon(){
  const q=(document.getElementById('cons').value||'').toLowerCase();
  const role=document.getElementById('conrole').value;
  const co=document.getElementById('conco').value;
  const sort=document.getElementById('consort').value;
  let list=contacts.filter(con=>{
    if(role!=='ALL'&&con.role!==role) return false;
    if(co!=='ALL'&&String(con.companyId||'')!==co) return false;
    const hn=globalNotes.filter(n=>n.targetType==='Contact'&&n.targetId===con.id).length>0;
    if(tglConNotes==='yes'&&!hn) return false;
    if(tglConNotes==='no'&&hn) return false;
    if(q){const hay=[con.name,con.email,con.phone,con.jobTitle,con.role,companies.find(c=>c.id===con.companyId)?.name||''].join(' ').toLowerCase();return hay.includes(q);}
    return true;
  }).sort((a,b)=>{
    let v=0;
    if(conSortKey==='name') v=a.name.localeCompare(b.name);
    else if(conSortKey==='title') v=(a.jobTitle||'').localeCompare(b.jobTitle||'');
    else if(conSortKey==='role') v=(a.role||'').localeCompare(b.role||'');
    else if(conSortKey==='activity'){const ln=x=>globalNotes.filter(n=>n.targetType==='Contact'&&n.targetId===x.id).sort((p,q)=>q.date.localeCompare(p.date))[0]?.date||x.lastActivity||'';v=ln(b).localeCompare(ln(a));}
    else{if(sort==='az')return a.name.localeCompare(b.name);if(sort==='za')return b.name.localeCompare(a.name);v=b.id-a.id;}
    return v*conSortDir;
  });
  document.getElementById('conmeta').textContent=`${list.length} of ${contacts.length} contact${contacts.length!==1?'s':''}`;
  document.getElementById('con-tbody').innerHTML=list.map(con=>{
    const lco=companies.find(c=>c.id===con.companyId);
    const ln=conLN(con)||con.lastActivity||'—';
    const rec=isRecent(ln);
    return`<tr onclick="openCon(${con.id})" style="cursor:pointer;${con.id===activeConId?'background:#f0fdf4':''}" onmouseenter="if(${con.id}!==${activeConId})this.style.background='#f8fafc'" onmouseleave="if(${con.id}!==${activeConId})this.style.background=''">
      <td><div style="display:flex;align-items:center;gap:8px">
        <div class="con-avatar-sm">${initials(con.name)}</div>
        <span style="font-weight:600;color:#0f172a">${con.name}</span>
      </div></td>
      <td style="color:#475569">${con.jobTitle}</td>
      <td>${lco?`<span class="badge" style="background:#f0fdf4;color:#065f46;font-size:11px">${lco.name}</span>`:'<span style="color:#94a3b8">—</span>'}</td>
      <td>${con.role?`<span class="badge" style="${roleStyle(con.role)}">${con.role}</span>`:'—'}</td>
      <td style="color:#475569;font-size:11px">${con.email}</td>
      <td style="color:#047857;font-size:11px">${con.phone}</td>
      <td style="font-size:11px;${rec?'color:#059669;font-weight:600':'color:#94a3b8'}">${ln}</td>
      <td><button onclick="event.stopPropagation();openCon(${con.id})" style="padding:4px 10px;border:1px solid #e2e8f0;border-radius:5px;background:#f8fafc;font-size:11px;color:#475569;cursor:pointer">Open →</button></td>
    </tr>`;
  }).join('');
}

function openCon(id){
  activeConId=id;
  renderCon();
  const con=contacts.find(x=>x.id===id);
  const lco=companies.find(c=>c.id===con.companyId);
  document.getElementById('con-drw-avatar').textContent=initials(con.name);
  document.getElementById('con-drw-name').textContent=con.name;
  document.getElementById('con-drw-sub').innerHTML=`<span style="font-size:11px;color:#64748b">${con.jobTitle}</span>${lco?`<span class="badge" style="background:#f0fdf4;color:#065f46">${lco.name}</span>`:''}${con.role?`<span class="badge" style="${roleStyle(con.role)}">${con.role}</span>`:''}`;
  const conNotes=globalNotes.filter(n=>n.targetType==='Contact'&&n.targetId===con.id).sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('con-drw-body').innerHTML=`
    <div class="dcard">
      <div class="dcard-title">Contact details</div>
      ${df('Full name',con.name)} ${df('Job title',con.jobTitle)} ${df('Email',con.email)} ${df('Mobile',con.phone)} ${df('LinkedIn',con.linkedin||'')}
      <div class="dfield"><label>Company</label><select style="width:100%;padding:7px 9px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;background:#fff;outline:none"><option>None</option>${companies.map(c=>`<option${c.id===con.companyId?' selected':''}>${c.name}</option>`).join('')}</select></div>
      <div class="dfield"><label>Role</label><select style="width:100%;padding:7px 9px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;background:#fff;outline:none"><option>None</option>${['Agent','Solicitor','Surveyor','Broker','Contractor','Investor','Other'].map(r=>`<option${r===con.role?' selected':''}>${r}</option>`).join('')}</select></div>
      ${df('How we met',con.origin||'')}
    </div>
    <div class="dcard">
      <div class="dcard-title">Activity notes</div>
      <div class="act-add"><textarea rows="2" placeholder="Add a note…"></textarea>
        <div class="act-row"><select><option>📞 Call</option><option>🤝 Meeting</option><option>✉️ Email</option><option>📋 Review</option><option>📝 Task</option><option>🚩 Flag</option></select><button>Add</button></div>
      </div>
      ${conNotes.map(n=>`<div class="note-card" style="background:${NOTE_BG[n.type]||'#f8fafc'};color:${NOTE_TEXT[n.type]||'#475569'};border-color:${NOTE_COLORS[n.type]||'#e2e8f0'}33">
        <button class="note-del">×</button>
        <span class="note-type-badge" style="background:${NOTE_COLORS[n.type]||'#94a3b8'}">${n.type}</span>
        <div style="font-size:12px;line-height:1.5">${n.text}</div>
        <div style="font-size:10px;margin-top:4px;opacity:.7">${n.author} · ${n.date}</div>
      </div>`).join('')}
      ${conNotes.length===0?'<p style="font-size:12px;color:#94a3b8">No notes yet</p>':''}
    </div>
  `;
  openDrawer('con');
}

function openDrawer(which){
  const isC=which==='co';
  document.getElementById('co-drawer').classList.toggle('open',isC);
  document.getElementById('con-drawer').classList.toggle('open',!isC);
  document.getElementById('overlay').classList.add('open');
}
function closeDrawer(){
  document.getElementById('co-drawer').classList.remove('open');
  document.getElementById('con-drawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  activeCoId=null; activeConId=null;
  renderCo(); if(document.getElementById('view-con').style.display!=='none') renderCon();
}

// Init
renderCo();
document.getElementById('view-con').style.display='none';
</script>
</body>
</html>
